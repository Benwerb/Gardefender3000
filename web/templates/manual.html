<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Tower Defence — Gardefender 3000</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <style>
    body { background: #000; color: #fff; user-select: none; }
    #video-container {
      position: relative;
      display: inline-block;
      width: 100%;
      max-width: 900px;
    }
    #video-feed {
      width: 100%;
      display: block;
      border: 2px solid #333;
    }
    #crosshair {
      position: absolute;
      top: 50%; left: 50%;
      transform: translate(-50%, -50%);
      pointer-events: none;
    }
    /* Stats panel — bottom-left of video */
    #stats-panel {
      position: absolute;
      bottom: 10px; left: 10px;
      background: rgba(0,0,0,0.6);
      border: 1px solid rgba(255,255,255,0.15);
      border-radius: 6px;
      padding: 6px 10px;
      font-size: 0.72rem;
      font-family: monospace;
      line-height: 1.6;
      pointer-events: none;
    }
    /* Mode badge — top-right of video */
    #mode-badge {
      position: absolute;
      top: 10px; right: 10px;
      font-size: 0.8rem;
      padding: 3px 8px;
    }
    #hint {
      position: absolute;
      bottom: 10px; right: 10px;
      font-size: 0.72rem;
      color: rgba(255,255,255,0.45);
      white-space: nowrap;
      pointer-events: none;
    }
    .key-hint {
      display: inline-block;
      background: #333;
      border: 1px solid #555;
      border-radius: 4px;
      padding: 1px 5px;
      font-family: monospace;
    }
    .preset-btn { min-width: 90px; }
    .preset-btn.active { box-shadow: 0 0 0 2px #fff; }
  </style>
</head>
<body class="d-flex flex-column align-items-center justify-content-start min-vh-100 py-3">

  <!-- Top bar -->
  <div class="d-flex align-items-center gap-3 mb-3 w-100" style="max-width:900px">
    <a href="{{ url_for('index') }}" class="btn btn-sm btn-outline-secondary">← Dashboard</a>
    <span class="fw-bold">Tower Defence</span>
    <span id="conn-badge" class="badge bg-danger ms-auto">Disconnected</span>
    <button id="mode-btn" class="btn btn-sm btn-warning">Switch to Auto</button>
  </div>

  <!-- Target class selector -->
  <div class="d-flex gap-2 mb-3 align-items-center" style="max-width:900px;width:100%">
    <span class="text-white-50 small me-1">Target:</span>
    {% for preset in presets %}
    <button class="btn btn-sm btn-outline-light preset-btn {% if loop.first %}active{% endif %}"
            data-preset="{{ preset }}"
            onclick="selectPreset('{{ preset }}')">
      {{ preset.title() }}
    </button>
    {% endfor %}
  </div>

  <!-- Video -->
  <div id="video-container">
    <img id="video-feed" src="{{ url_for('video_feed') }}" alt="Camera feed">

    <!-- Crosshair -->
    <svg id="crosshair" width="60" height="60" viewBox="0 0 60 60">
      <line x1="30" y1="0"  x2="30" y2="25" stroke="rgba(0,255,0,0.8)" stroke-width="1.5"/>
      <line x1="30" y1="35" x2="30" y2="60" stroke="rgba(0,255,0,0.8)" stroke-width="1.5"/>
      <line x1="0"  y1="30" x2="25" y2="30" stroke="rgba(0,255,0,0.8)" stroke-width="1.5"/>
      <line x1="35" y1="30" x2="60" y2="30" stroke="rgba(0,255,0,0.8)" stroke-width="1.5"/>
      <circle cx="30" cy="30" r="5" fill="none" stroke="rgba(0,255,0,0.8)" stroke-width="1.5"/>
    </svg>

    <!-- Stats overlay (bottom-left) -->
    <div id="stats-panel">
      <div>FPS: <span id="s-fps">—</span></div>
      <div>CPU: <span id="s-cpu">—</span>%</div>
      <div>Temp: <span id="s-temp">—</span>°C</div>
      <div>Pan: <span id="s-pan">—</span>°</div>
      <div>Tilt: <span id="s-tilt">—</span>°</div>
    </div>

    <!-- Mode badge (top-right) -->
    <span id="mode-badge" class="badge bg-success">MANUAL</span>

    <!-- Key hint (bottom-right) -->
    <div id="hint">
      <span class="key-hint">←→</span> Pan &nbsp;
      <span class="key-hint">↑↓</span> Tilt &nbsp;
      <span class="key-hint">Space</span> Fire
    </div>
  </div>

  <!-- Fire flash overlay -->
  <div id="fire-flash"
       style="position:fixed;top:0;left:0;width:100%;height:100%;
              background:rgba(255,80,0,0.35);pointer-events:none;
              display:none;z-index:999;">
  </div>

  <!-- Detection gallery -->
  <div class="mt-4 w-100" style="max-width:900px">
    <div class="card bg-secondary text-light">
      <div class="card-header d-flex justify-content-between align-items-center flex-wrap gap-2">
        <span>Detection Gallery <span class="badge bg-dark ms-1" id="detection-count">—</span></span>
        <div id="class-filters" class="d-flex flex-wrap gap-1"></div>
      </div>
      <div class="card-body">
        <div id="detection-gallery" class="row g-2">
          <div class="col text-center text-white-50 py-3">Loading…</div>
        </div>
      </div>
    </div>
  </div>

  <!-- Detection event modal -->
  <div class="modal fade" id="detection-modal" tabindex="-1">
    <div class="modal-dialog modal-xl modal-dialog-scrollable">
      <div class="modal-content bg-dark text-light">
        <div class="modal-header border-secondary">
          <h5 class="modal-title text-capitalize" id="modal-title"></h5>
          <button type="button" class="btn-close btn-close-white" data-bs-dismiss="modal"></button>
        </div>
        <div class="modal-body">
          <div class="row g-2" id="modal-frames"></div>
        </div>
      </div>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  <script src="https://cdn.socket.io/4.7.5/socket.io.min.js"></script>
  <script>
    const socket = io();
    let currentMode = "manual";
    let activePreset = "{{ presets[0] }}";

    // ── Connection ────────────────────────────────────────────────────────
    socket.on("connect", () => {
      document.getElementById("conn-badge").textContent = "Connected";
      document.getElementById("conn-badge").className = "badge bg-success ms-auto";
      socket.emit("set_mode", { mode: "manual" });
      socket.emit("set_classes", { preset: activePreset });
    });

    socket.on("disconnect", () => {
      document.getElementById("conn-badge").textContent = "Disconnected";
      document.getElementById("conn-badge").className = "badge bg-danger ms-auto";
    });

    socket.on("mode_changed", (data) => {
      currentMode = data.mode;
      const badge = document.getElementById("mode-badge");
      const btn   = document.getElementById("mode-btn");
      if (data.mode === "manual") {
        badge.textContent = "MANUAL";
        badge.className = "badge bg-success";
        btn.textContent = "Switch to Auto";
      } else {
        badge.textContent = "AUTO";
        badge.className = "badge bg-warning text-dark";
        btn.textContent = "Switch to Manual";
      }
    });

    socket.on("classes_changed", (data) => {
      activePreset = data.preset;
      document.querySelectorAll(".preset-btn").forEach(btn => {
        btn.classList.toggle("active", btn.dataset.preset === data.preset);
      });
    });

    // ── Mode toggle ───────────────────────────────────────────────────────
    document.getElementById("mode-btn").addEventListener("click", () => {
      const next = currentMode === "manual" ? "auto" : "manual";
      socket.emit("set_mode", { mode: next });
    });

    // ── Class preset selector ─────────────────────────────────────────────
    function selectPreset(preset) {
      socket.emit("set_classes", { preset });
    }

    // ── Keyboard movement ─────────────────────────────────────────────────
    const KEY_MAP = {
      ArrowLeft:  { pan:  1, tilt:  0 },
      ArrowRight: { pan: -1, tilt:  0 },
      ArrowUp:    { pan:  0, tilt: -1 },
      ArrowDown:  { pan:  0, tilt:  1 },
    };
    const pressed = new Set();

    document.addEventListener("keydown", (e) => {
      if (e.repeat) return;
      if (e.code === "Space") {
        e.preventDefault();
        socket.emit("fire");
        flashScreen();
        return;
      }
      const dir = KEY_MAP[e.code];
      if (!dir) return;
      e.preventDefault();
      pressed.add(e.code);
      sendMove();
    });

    document.addEventListener("keyup", (e) => {
      pressed.delete(e.code);
      sendMove();
    });

    function sendMove() {
      let pan = 0, tilt = 0;
      for (const key of pressed) {
        const dir = KEY_MAP[key];
        if (dir) { pan += dir.pan; tilt += dir.tilt; }
      }
      socket.emit("move", { pan, tilt });
    }

    function flashScreen() {
      const el = document.getElementById("fire-flash");
      el.style.display = "block";
      setTimeout(() => { el.style.display = "none"; }, 150);
    }

    // ── Stats polling ─────────────────────────────────────────────────────
    async function refreshStats() {
      try {
        const res  = await fetch("/api/stats");
        const data = await res.json();
        document.getElementById("s-fps").textContent  = data.fps   ?? "—";
        document.getElementById("s-cpu").textContent  = data.cpu   ?? "—";
        document.getElementById("s-temp").textContent = data.temp_c ?? "—";
        document.getElementById("s-pan").textContent  = data.pan_angle  ?? "—";
        document.getElementById("s-tilt").textContent = data.tilt_angle ?? "—";
      } catch (e) {
        console.error("Stats fetch failed", e);
      }
    }

    refreshStats();
    setInterval(refreshStats, 1000);

    // ── Detection gallery ─────────────────────────────────────────────────
    let activeFilter = "all";

    async function refreshGallery() {
      try {
        const events = await (await fetch("/api/detections")).json();
        window._detectionEvents = events;
        document.getElementById("detection-count").textContent = events.length;
        buildFilters(events);
        renderGallery(events);
      } catch (e) { console.error(e); }
    }

    function buildFilters(events) {
      const classes   = ["all", ...new Set(events.map(e => e.label))].sort();
      const container = document.getElementById("class-filters");
      const existing  = [...container.querySelectorAll("button")].map(b => b.dataset.label).join(",");
      if (existing === classes.join(",")) return;
      container.innerHTML = classes.map(c => `
        <button class="btn btn-sm ${c === activeFilter ? 'btn-light' : 'btn-outline-light'}"
                data-label="${c}" onclick="setFilter('${c}')">
          ${c === "all" ? "All" : c.charAt(0).toUpperCase() + c.slice(1)}
        </button>
      `).join("");
    }

    function setFilter(label) {
      activeFilter = label;
      renderGallery(window._detectionEvents || []);
      document.querySelectorAll("#class-filters button").forEach(btn => {
        btn.className = `btn btn-sm ${btn.dataset.label === label ? "btn-light" : "btn-outline-light"}`;
      });
    }

    function renderGallery(events) {
      const gallery  = document.getElementById("detection-gallery");
      const filtered = activeFilter === "all" ? events : events.filter(e => e.label === activeFilter);
      if (!filtered.length) {
        gallery.innerHTML = '<div class="col text-center text-white-50 py-3">No detections yet.</div>';
        return;
      }
      gallery.innerHTML = filtered.map(e => {
        const gi = events.indexOf(e);
        return `
          <div class="col-6 col-md-3 col-lg-2">
            <div class="card bg-dark text-light h-100" style="cursor:pointer" onclick="openEvent(${gi})">
              <img src="/detections/${e.name}/${e.thumbnail}" class="card-img-top"
                   style="object-fit:cover;height:100px;" loading="lazy">
              <div class="card-body p-1">
                <div class="fw-semibold text-capitalize small">${e.label}</div>
                <div class="text-white-50" style="font-size:0.7rem">${e.timestamp}</div>
                <div class="text-white-50" style="font-size:0.7rem">${e.frames.length} frames</div>
              </div>
            </div>
          </div>`;
      }).join("");
    }

    function openEvent(index) {
      const e = window._detectionEvents[index];
      document.getElementById("modal-title").textContent = e.label + " — " + e.timestamp;
      document.getElementById("modal-frames").innerHTML = e.frames.map(f => `
        <div class="col-6 col-md-4">
          <img src="/detections/${e.name}/${f}" class="img-fluid rounded" loading="lazy">
        </div>`).join("");
      new bootstrap.Modal(document.getElementById("detection-modal")).show();
    }

    refreshGallery();
    setInterval(refreshGallery, 10000);
  </script>
</body>
</html>
