<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Gardefender 3000</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body class="bg-dark text-light">

  <nav class="navbar navbar-dark bg-black px-3">
    <span class="navbar-brand fw-bold">Gardefender 3000</span>
    <div class="d-flex gap-2">
      <a href="{{ url_for('manual') }}" class="btn btn-sm btn-outline-success">Tower Defence</a>
      <a href="{{ url_for('logout') }}" class="btn btn-sm btn-outline-secondary">Logout</a>
    </div>
  </nav>

  <div class="container py-4">

    <!-- Status + Water Now -->
    <div class="row g-3 mb-3">
      <div class="col-md-6">
        <div class="card bg-secondary text-light h-100">
          <div class="card-body">
            <h6 class="card-subtitle mb-2 text-white-50">Status</h6>
            <div id="status-badge" class="fs-5 fw-semibold">
              <span class="spinner-border spinner-border-sm me-1"></span> Loading…
            </div>
            <p class="mb-0 mt-2 small text-white-50" id="last-watered-text">—</p>
          </div>
        </div>
      </div>

      <div class="col-md-6">
        <div class="card bg-secondary text-light h-100">
          <div class="card-body">
            <h6 class="card-subtitle mb-3 text-white-50">Water Now</h6>
            <form id="water-form">
              <label class="form-label small">
                Duration: <strong id="duration-label">10</strong>s
              </label>
              <input type="range" class="form-range mb-3"
                     id="duration-slider" min="5" max="300" step="5" value="10"
                     oninput="document.getElementById('duration-label').textContent=this.value">
              <button type="submit" id="water-btn" class="btn btn-success w-100">
                Water Plants
              </button>
            </form>
          </div>
        </div>
      </div>
    </div>

    <!-- Watering Schedules -->
    <div class="card bg-secondary text-light mb-3">
      <div class="card-header">Watering Schedules</div>
      <div class="card-body">

        <!-- Add schedule form -->
        <form id="schedule-form" class="row g-2 align-items-end mb-3">
          <div class="col-auto">
            <label class="form-label small">Time</label>
            <input type="time" id="sched-time" class="form-control form-control-sm bg-dark text-light border-secondary" required>
          </div>
          <div class="col">
            <label class="form-label small">Duration: <strong id="sched-dur-label">60</strong>s</label>
            <input type="range" class="form-range"
                   id="sched-dur-slider" min="5" max="300" step="5" value="60"
                   oninput="document.getElementById('sched-dur-label').textContent=this.value">
          </div>
          <div class="col-auto">
            <button type="submit" class="btn btn-sm btn-success">Add Schedule</button>
          </div>
        </form>

        <!-- Schedule list -->
        <div id="schedule-list">
          <div class="text-white-50 small">Loading…</div>
        </div>

      </div>
    </div>

    <!-- Watering log -->
    <div class="card bg-secondary text-light">
      <div class="card-header">Recent Watering Events</div>
      <div class="card-body p-0">
        <div style="max-height: 400px; overflow-y: auto;">
          <table class="table table-dark table-sm table-striped mb-0">
            <thead class="sticky-top">
              <tr>
                <th>Time</th>
                <th>Duration</th>
                <th>Triggered by</th>
                <th>Result</th>
              </tr>
            </thead>
            <tbody id="log-body">
              <tr><td colspan="4" class="text-center text-white-50 py-3">Loading…</td></tr>
            </tbody>
          </table>
        </div>
      </div>
    </div>

  </div>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  <script>
    let isWatering = false;

    function timeSince(isoStr) {
      if (!isoStr) return "Never";
      let s = isoStr.includes("T") ? isoStr : isoStr.replace(" ", "T");
      if (!s.endsWith("Z") && !s.includes("+")) s += "Z";
      const d = new Date(s);
      const secs = Math.floor((Date.now() - d.getTime()) / 1000);
      if (secs < 60) return secs + "s ago";
      if (secs < 3600) return Math.floor(secs / 60) + "m ago";
      if (secs < 86400) return Math.floor(secs / 3600) + "h ago";
      return Math.floor(secs / 86400) + "d ago";
    }

    // ── Status ──────────────────────────────────────────────────────────
    async function refreshStatus() {
      try {
        const res  = await fetch("/api/status");
        const data = await res.json();
        isWatering = data.is_watering;
        const badge = document.getElementById("status-badge");
        const btn   = document.getElementById("water-btn");
        if (isWatering) {
          badge.innerHTML = '<span class="text-warning">Watering in progress…</span>';
          btn.disabled = true;
          btn.textContent = "Watering…";
        } else {
          badge.innerHTML = '<span class="text-white">Idle</span>';
          btn.disabled = false;
          btn.textContent = "Water Plants";
        }
        const lastEl = document.getElementById("last-watered-text");
        lastEl.textContent = data.last_watering
          ? "Last watered: " + timeSince(data.last_watering.timestamp)
          : "No watering events yet.";
      } catch (e) { console.error(e); }
    }

    // ── Log ─────────────────────────────────────────────────────────────
    async function refreshLog() {
      try {
        const rows  = await (await fetch("/api/log")).json();
        const tbody = document.getElementById("log-body");
        if (!rows.length) {
          tbody.innerHTML = '<tr><td colspan="4" class="text-center text-white-50 py-3">No events yet.</td></tr>';
          return;
        }
        tbody.innerHTML = rows.map(r => `
          <tr>
            <td>${timeSince(r.timestamp)}</td>
            <td>${r.duration_sec}s</td>
            <td>${r.trigger_type}</td>
            <td>${r.success ? '<span class="text-success">OK</span>' : '<span class="text-danger">Failed</span>'}</td>
          </tr>
        `).join("");
      } catch (e) { console.error(e); }
    }

    // ── Water now ────────────────────────────────────────────────────────
    document.getElementById("water-form").addEventListener("submit", async (e) => {
      e.preventDefault();
      if (isWatering) return;
      const duration = document.getElementById("duration-slider").value;
      await fetch("/water", { method: "POST", body: new URLSearchParams({ duration }) });
      await refreshStatus();
      await refreshLog();
    });

    // ── Schedules ────────────────────────────────────────────────────────
    async function refreshSchedules() {
      try {
        const schedules = await (await fetch("/api/schedules")).json();
        const el = document.getElementById("schedule-list");
        if (!schedules.length) {
          el.innerHTML = '<div class="text-white-50 small">No schedules set.</div>';
          return;
        }
        el.innerHTML = schedules.map(s => `
          <div class="d-flex justify-content-between align-items-center border-bottom border-dark py-2">
            <span>
              <strong>${String(s.hour).padStart(2,"0")}:${String(s.minute).padStart(2,"0")}</strong>
              &nbsp;—&nbsp; ${s.duration_sec}s
            </span>
            <button class="btn btn-sm btn-outline-danger" onclick="deleteSchedule(${s.id})">Remove</button>
          </div>
        `).join("");
      } catch (e) { console.error(e); }
    }

    document.getElementById("schedule-form").addEventListener("submit", async (e) => {
      e.preventDefault();
      const time     = document.getElementById("sched-time").value;       // "HH:MM"
      const duration = document.getElementById("sched-dur-slider").value;
      if (!time) return;
      const [hour, minute] = time.split(":").map(Number);
      await fetch("/api/schedules", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ hour, minute, duration_sec: Number(duration) }),
      });
      document.getElementById("sched-time").value = "";
      await refreshSchedules();
    });

    async function deleteSchedule(id) {
      await fetch(`/api/schedules/${id}`, { method: "DELETE" });
      await refreshSchedules();
    }

    // ── Poll ─────────────────────────────────────────────────────────────
    refreshStatus();
    refreshLog();
    refreshSchedules();
    setInterval(async () => {
      await refreshStatus();
      await refreshLog();
    }, 5000);
  </script>

</body>
</html>
